<div class="toolbar">
    <button (click)="format('bold')"><b>B</b></button>
    <button (click)="format('italic')"><i>I</i></button>
    <button (click)="format('underline')"><u>U</u></button>
    <button (click)="format('insertUnorderedList')">• List</button>
    <button (click)="format('formatBlock', 'h1')">H1</button>
    <button (click)="format('formatBlock', 'h2')">H2</button>
    <button (click)="format('formatBlock', 'p')">P</button>
    <button (click)="clearFormatting()">Clear</button>
    <button (click)="insertLink()">🔗 Link</button>
    <button (click)="triggerImageUpload()">📁 Upload Image</button>
    <input
        type="file"
        accept="image/*"
        #imageInput
        (change)="uploadImageEncoded($event)"
        style="display: none;"
    />

    <!-- Submit Button -->
    <button (click)="submitContent()" class="submit-btn">📤 Submit</button>
    <button (click)="triggerPreview()" class="preview-btn">👁️ Preview</button>

</div>

<div
    class="editor"
    contenteditable="true"
    #editor
    (input)="updateContent()"
    (click)="onEditorClick($event)"
    (blur)="saveSelection()"
    (paste)="onPaste($event)"
>
</div>

<!-- Link Dialog -->
<div class="link-dialog" *ngIf="showLinkDialog">
    <div class="imt-row">
        <span class="imt-label">URL odkazu</span>
        <input type="url" [(ngModel)]="linkUrl" placeholder="https://" class="link-url-input">
    </div>
    <div class="imt-row">
        <span class="imt-label">Otvoriť v</span>
        <div class="float-btns">
            <button [class.active]="linkTarget === '_blank'" (click)="linkTarget = '_blank'">Novom tabe</button>
            <button [class.active]="linkTarget === '_self'"  (click)="linkTarget = '_self'">Rovnakej stránke</button>
        </div>
    </div>
    <div class="imt-row">
        <button class="imt-close" style="flex:1; margin-right:4px" (click)="confirmLink()">✓ Potvrdiť</button>
        <button class="imt-close" style="flex:1" (click)="cancelLink()">✕ Zrušiť</button>
    </div>
</div>

<!-- Image Styling Toolbar -->
<div class="image-toolbar" *ngIf="selectedImage" [ngStyle]="imageToolbarPos">

    <div class="imt-row">
        <span class="imt-label">Obtekanie</span>
        <div class="float-btns">
            <button [class.active]="imageStyles.float === 'none'" (click)="setFloat('none')">⬛ Blok</button>
            <button [class.active]="imageStyles.float === 'left'" (click)="setFloat('left')">◧ Vľavo</button>
            <button [class.active]="imageStyles.float === 'right'" (click)="setFloat('right')">◨ Vpravo</button>
        </div>
    </div>

    <div class="imt-row">
        <span class="imt-label">Veľkosť</span>
        <div class="float-btns">
            <button [class.active]="imageSize === 'img-sm'"   (click)="setSize('img-sm')">S</button>
            <button [class.active]="imageSize === 'img-md'"   (click)="setSize('img-md')">M</button>
            <button [class.active]="imageSize === 'img-lg'"   (click)="setSize('img-lg')">L</button>
            <button [class.active]="imageSize === 'img-full'" (click)="setSize('img-full')">Full</button>
        </div>
    </div>

    <div class="imt-row">
        <span class="imt-label">Zaoblenie: <b>{{ imageRadiusPx }}px</b></span>
        <input type="range" min="0" max="50" step="1" [(ngModel)]="imageRadiusPx" (input)="onRadiusSlider()">
    </div>

    <button class="imt-close" (click)="deselectImage()">✕ Zavrieť</button>
</div>

<h3>Generated HTML:</h3>
<pre>{{ content }}</pre>
